<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">ShopHorizon</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html">Products</a></li>
                <li><a href="#" class="cart-link">Cart (<span id="cart-count">0</span>)</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero-banner">
        <h1>Premium Gear. Zero Friction.</h1>
        <p>Curated minimalist essentials for creators and tech professionals.</p>
    </section>

    <main class="store-container">

        <div class="product-card">
            <div class="img-placeholder"></div>
            <h3 class="product-title">Minimalist Tech Bag</h3>
            <p class="product-price">$49.99</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="img-placeholder"></div>
            <h3 class="product-title">Wireless Earbuds</h3>
            <p class="product-price">$79.99</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="img-placeholder"></div>
            <h3 class="product-title">Smart Desk Lamp</h3>
            <p class="product-price">$29.99</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="img-placeholder"></div>
            <h3 class="product-title">Ergonomic Mouse</h3>
            <p class="product-price">$59.99</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
</body>

</html>
